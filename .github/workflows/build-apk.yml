name: Build Android APK

on:
  push:
    paths:
      - 'android/AudioSender/**'
      - '.github/workflows/build-apk.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: false

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Install SDK components
      run: sdkmanager "platforms;android-34" "build-tools;34.0.0"

    - name: Build Debug APK
      working-directory: android/AudioSender
      run: |
        # Generate the gradle wrapper
        gradle wrapper --gradle-version 8.5
        chmod +x gradlew
        # Build and show FULL output (no tail) so we can see errors
        ./gradlew assembleDebug --no-daemon --no-build-cache 2>&1 || true
        # Show the last part of the build log for debugging
        echo "=== BUILD STATUS ==="
        ./gradlew assembleDebug --no-daemon --no-build-cache

    - name: List APK outputs
      if: always()
      working-directory: android/AudioSender
      run: find . -name "*.apk" -type f 2>/dev/null || echo "No APK files found"

    - name: Upload APK
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: AudioSender-APK
        path: android/AudioSender/app/build/outputs/apk/debug/app-debug.apk
